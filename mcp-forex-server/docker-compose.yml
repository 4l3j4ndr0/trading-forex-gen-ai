services:
  mcp-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
